<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevQ — Technical Q&A powered by Claude</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
      }

      header {
        width: 100%;
        max-width: 720px;
        margin-bottom: 2rem;
      }

      header h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: #f8fafc;
        letter-spacing: -0.02em;
      }

      header p {
        color: #94a3b8;
        margin-top: 0.25rem;
        font-size: 0.95rem;
      }

      .card {
        width: 100%;
        max-width: 720px;
        background: #1e2130;
        border: 1px solid #2d3148;
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }

      textarea {
        width: 100%;
        background: #0f1117;
        border: 1px solid #2d3148;
        border-radius: 8px;
        color: #e2e8f0;
        font-size: 1rem;
        line-height: 1.6;
        padding: 0.875rem 1rem;
        resize: vertical;
        min-height: 120px;
        outline: none;
        transition: border-color 0.15s;
      }

      textarea:focus { border-color: #6366f1; }
      textarea::placeholder { color: #475569; }

      .actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 1rem;
      }

      button {
        background: #6366f1;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.625rem 1.5rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
      }

      button:hover:not(:disabled) { background: #4f51d8; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      #response-section { display: none; }

      .label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #6366f1;
        margin-bottom: 0.75rem;
      }

      #answer {
        font-size: 0.975rem;
        line-height: 1.75;
        white-space: pre-wrap;
        word-break: break-word;
        color: #cbd5e1;
      }

      .meta {
        margin-top: 1rem;
        font-size: 0.75rem;
        color: #475569;
        display: flex;
        gap: 1rem;
      }

      .error-card {
        width: 100%;
        max-width: 720px;
        background: #2a1a1a;
        border: 1px solid #7f1d1d;
        border-radius: 12px;
        padding: 1rem 1.5rem;
        color: #fca5a5;
        font-size: 0.9rem;
        display: none;
      }

      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <header>
      <h1>DevQ</h1>
      <p>Technical Q&amp;A powered by Claude — ask anything about code, systems, or software.</p>
    </header>

    <div class="card">
      <textarea
        id="question"
        placeholder="e.g. What is the difference between a process and a thread?"
        autofocus
      ></textarea>
      <div class="actions">
        <button id="ask-btn" onclick="askQuestion()">Ask Claude</button>
      </div>
    </div>

    <div class="error-card" id="error-card">
      <strong>Error:</strong> <span id="error-msg"></span>
    </div>

    <div class="card" id="response-section">
      <div class="label">Claude's Answer</div>
      <div id="answer"></div>
      <div class="meta">
        <span id="meta-model"></span>
        <span id="meta-stop"></span>
      </div>
    </div>

    <script>
      const questionEl = document.getElementById("question");
      const askBtn = document.getElementById("ask-btn");
      const responseSection = document.getElementById("response-section");
      const answerEl = document.getElementById("answer");
      const errorCard = document.getElementById("error-card");
      const errorMsg = document.getElementById("error-msg");
      const metaModel = document.getElementById("meta-model");
      const metaStop = document.getElementById("meta-stop");

      questionEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) askQuestion();
      });

      async function askQuestion() {
        const question = questionEl.value.trim();
        if (!question) return;

        setLoading(true);
        hideAll();

        try {
          const res = await fetch("/api/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question }),
          });

          const data = await res.json();

          if (!res.ok) {
            showError(data.error ?? "An unknown error occurred.");
            return;
          }

          answerEl.textContent = data.answer;
          metaModel.textContent = `Model: ${data.model}`;
          metaStop.textContent = `Stop reason: ${data.stop_reason}`;
          responseSection.style.display = "block";
        } catch {
          showError("Network error — could not reach the server. Is it running?");
        } finally {
          setLoading(false);
        }
      }

      function setLoading(on) {
        askBtn.disabled = on;
        askBtn.innerHTML = on
          ? '<span class="spinner"></span>Thinking…'
          : "Ask Claude";
      }

      function hideAll() {
        responseSection.style.display = "none";
        errorCard.style.display = "none";
      }

      function showError(msg) {
        errorMsg.textContent = msg;
        errorCard.style.display = "block";
      }
    </script>
  </body>
</html>
