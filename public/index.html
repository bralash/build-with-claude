<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevQ — Technical Q&A powered by Claude</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">

      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-brand">
          <span class="brand-name">DevQ</span>
          <span class="brand-tag">powered by Claude</span>
        </div>
        <div class="topbar-actions">
          <span class="active-persona-badge" id="active-persona-badge"></span>
          <button class="icon-btn" id="settings-open" aria-label="Open settings">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Chat thread -->
      <main id="chat-messages">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">💬</div>
          <p class="empty-title">Start a conversation</p>
          <p class="empty-sub" id="empty-sub"></p>
        </div>
      </main>

      <!-- Input bar -->
      <footer class="input-bar">
        <div class="input-wrap">
          <textarea id="question" rows="1" placeholder="Ask a question…" autofocus></textarea>
          <button id="ask-btn" aria-label="Send">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>

        <!-- Model selector -->
        <div class="model-row">
          <span class="model-row-label">Model</span>
          <div class="model-chips" id="model-chips">
            <button class="model-chip" data-model="claude-haiku-4-5">
              ⚡ <span>Haiku</span>
            </button>
            <button class="model-chip" data-model="claude-sonnet-4-6">
              ✦ <span>Sonnet</span>
            </button>
            <button class="model-chip" data-model="claude-opus-4-5">
              🧠 <span>Opus</span>
            </button>
          </div>
        </div>

        <p class="input-hint">
          <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line
        </p>
      </footer>

    </div>

    <!-- Settings overlay -->
    <div class="settings-overlay" id="settings-overlay"></div>

    <!-- Settings panel -->
    <aside class="settings-panel" id="settings-panel" aria-hidden="true">
      <div class="settings-header">
        <h2 class="settings-title">Settings</h2>
        <button class="icon-btn" id="settings-close" aria-label="Close settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="settings-body">

        <!-- Persona -->
        <section class="settings-section">
          <div class="settings-section-title">Persona</div>
          <div class="settings-section-desc">Choose the assistant's role and focus.</div>
          <div class="persona-list" id="persona-list"></div>
        </section>

        <!-- Appearance -->
        <section class="settings-section">
          <div class="settings-section-title">Appearance</div>
          <div class="settings-section-desc">Switch between dark and light mode.</div>
          <div class="theme-switcher">
            <button class="theme-option" data-theme-val="dark" id="theme-dark">
              <span class="theme-option-icon">🌙</span>
              <span>Dark</span>
            </button>
            <button class="theme-option" data-theme-val="light" id="theme-light">
              <span class="theme-option-icon">☀️</span>
              <span>Light</span>
            </button>
          </div>
        </section>

        <!-- Streaming -->
        <section class="settings-section">
          <div class="settings-row-between">
            <div>
              <div class="settings-section-title">
                Response Streaming
                <span class="coming-soon-badge">Coming soon</span>
              </div>
              <div class="settings-section-desc">
                Stream tokens in real time as Claude generates the response.
              </div>
            </div>
            <button class="toggle-switch" disabled aria-disabled="true" aria-checked="false" role="switch">
              <span class="toggle-thumb"></span>
            </button>
          </div>
        </section>

      </div>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
