<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevQ — Technical Q&A powered by Claude</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>DevQ</h1>
      <p>A multi-persona Q&amp;A assistant powered by Claude.</p>
    </header>

    <div class="card">
      <div class="persona-row">
        <label for="persona" class="persona-label">Assistant persona</label>
        <select id="persona">
          <option value="technical">💻 Technical &amp; Code</option>
          <option value="marketing">📣 Marketing</option>
          <option value="hr">🤝 Human Resources</option>
          <option value="training">🎓 Training &amp; Teaching</option>
          <option value="recruitment">🔍 Recruitment</option>
        </select>
      </div>
      <p id="persona-description" class="persona-description"></p>
      <textarea
        id="question"
        placeholder="Ask your question…"
        autofocus
      ></textarea>
      <div class="actions">
        <button id="ask-btn" onclick="askQuestion()">Ask Claude</button>
      </div>
    </div>

    <div class="error-card" id="error-card">
      <strong>Error:</strong> <span id="error-msg"></span>
    </div>

    <div class="card" id="response-section">
      <div class="label">Claude's Answer</div>
      <div id="answer" class="answer"></div>
      <div class="meta">
        <span id="meta-persona"></span>
        <span id="meta-model"></span>
        <span id="meta-stop"></span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
