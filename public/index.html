<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevQ — Technical Q&A powered by Claude</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">

      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-brand">
          <span class="brand-name">DevQ</span>
          <span class="brand-tag">powered by Claude</span>
        </div>
        <div class="topbar-controls">
          <label for="persona" class="persona-label">Persona</label>
          <select id="persona">
            <option value="technical">💻 Technical &amp; Code</option>
            <option value="marketing">📣 Marketing</option>
            <option value="hr">🤝 Human Resources</option>
            <option value="training">🎓 Training &amp; Teaching</option>
            <option value="recruitment">🔍 Recruitment</option>
          </select>
        </div>
      </header>

      <!-- Chat thread -->
      <main id="chat-messages">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">💬</div>
          <p class="empty-title">Start a conversation</p>
          <p class="empty-sub" id="empty-sub"></p>
        </div>
      </main>

      <!-- Input bar -->
      <footer class="input-bar">
        <div class="input-wrap">
          <textarea
            id="question"
            rows="1"
            placeholder="Ask a question…"
            autofocus
          ></textarea>
          <button id="ask-btn" aria-label="Send">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Press <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line</p>
      </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
